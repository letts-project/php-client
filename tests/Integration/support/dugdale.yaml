listen: 127.0.0.1:${PORT}
data_dir: ${DATA_DIR}
log:
  level: info
  format: text
  output: stderr
auth:
  tokens:
    - t-dispatch
admin:
  tokens:
    - t-admin
cleanup:
  success_ttl: 1h
  failed_ttl: 24h
  staging_ttl: 1h
  sweep_interval: 30s
limits:
  default_kill_grace: 2s
  reader_post_exit_grace: 2s
